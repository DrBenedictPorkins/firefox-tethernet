<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="96" height="96" rx="16" fill="#1a1a2e"/>

  <!-- Hole (dark circle) -->
  <circle cx="48" cy="52" r="28" fill="#0d0d1a"/>
  <circle cx="48" cy="52" r="28" stroke="#2a2a3e" stroke-width="2"/>

  <!-- Fox ears poking up -->
  <path d="M28 32 L36 48 L28 48 Z" fill="#ff6b35"/>
  <path d="M68 32 L60 48 L68 48 Z" fill="#ff6b35"/>
  <!-- Inner ear -->
  <path d="M30 36 L35 46 L30 46 Z" fill="#ff8c5a"/>
  <path d="M66 36 L61 46 L66 46 Z" fill="#ff8c5a"/>

  <!-- Fox face/snout hint -->
  <ellipse cx="48" cy="62" rx="12" ry="8" fill="#ff6b35"/>
  <ellipse cx="48" cy="60" rx="8" ry="5" fill="#ff8c5a"/>

  <!-- Nose -->
  <ellipse cx="48" cy="64" rx="3" ry="2" fill="#1a1a2e"/>

  <!-- Eyes - bright and alert (investigating!) -->
  <ellipse cx="38" cy="52" rx="6" ry="7" fill="#fff"/>
  <ellipse cx="58" cy="52" rx="6" ry="7" fill="#fff"/>
  <!-- Pupils -->
  <circle cx="39" cy="52" r="3" fill="#1a1a2e"/>
  <circle cx="59" cy="52" r="3" fill="#1a1a2e"/>
  <!-- Eye shine -->
  <circle cx="40" cy="50" r="1.5" fill="#fff"/>
  <circle cx="60" cy="50" r="1.5" fill="#fff"/>
</svg>
