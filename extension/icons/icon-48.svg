<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="48" height="48" rx="8" fill="#1a1a2e"/>

  <!-- Hole (dark circle) -->
  <circle cx="24" cy="26" r="14" fill="#0d0d1a"/>
  <circle cx="24" cy="26" r="14" stroke="#2a2a3e" stroke-width="1"/>

  <!-- Fox ears poking up -->
  <path d="M14 16 L18 24 L14 24 Z" fill="#ff6b35"/>
  <path d="M34 16 L30 24 L34 24 Z" fill="#ff6b35"/>

  <!-- Fox face/snout hint -->
  <ellipse cx="24" cy="31" rx="6" ry="4" fill="#ff6b35"/>

  <!-- Nose -->
  <ellipse cx="24" cy="32" rx="1.5" ry="1" fill="#1a1a2e"/>

  <!-- Eyes -->
  <ellipse cx="19" cy="26" rx="3" ry="3.5" fill="#fff"/>
  <ellipse cx="29" cy="26" rx="3" ry="3.5" fill="#fff"/>
  <!-- Pupils -->
  <circle cx="19.5" cy="26" r="1.5" fill="#1a1a2e"/>
  <circle cx="29.5" cy="26" r="1.5" fill="#1a1a2e"/>
</svg>
